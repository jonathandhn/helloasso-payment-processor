stages:
  - build
  - release

build_release:
  stage: build
  image: php:8.4-alpine
  before_script:
    - apk add --no-cache git zip unzip bash
  script:
    - VERSION=${CI_COMMIT_TAG}
    - echo "Building version ${VERSION}"
    - bash scripts/build_release.sh "${VERSION}"
  artifacts:
    name: "helloasso-payment-processor-${CI_COMMIT_TAG}"
    paths:
      - helloasso-payment-processor-*.zip
    expire_in: 4 weeks
  rules:
    - if: $CI_COMMIT_TAG

create_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build_release
      artifacts: true
  script:
    - echo "Creating release on GitLab for ${CI_COMMIT_TAG}"
  release:
    name: 'Release ${CI_COMMIT_TAG}'
    description: 'Release automatique construite et packagée par le pipeline GitLab CI.'
    tag_name: '${CI_COMMIT_TAG}'
    assets:
      links:
        - name: 'helloasso-payment-processor-${CI_COMMIT_TAG}.zip'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/helloasso-payment-processor-${CI_COMMIT_TAG}.zip?job=build_release'
  rules:
    - if: $CI_COMMIT_TAG
