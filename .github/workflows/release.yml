name: Build and Release Extension

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set version env
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build and validate release archive
        env:
          HELLOASSO_LIVE_CLIENT_ID: ${{ secrets.HELLOASSO_LIVE_CLIENT_ID }}
          HELLOASSO_LIVE_CLIENT_SECRET: ${{ secrets.HELLOASSO_LIVE_CLIENT_SECRET }}
          HELLOASSO_SANDBOX_CLIENT_ID: ${{ secrets.HELLOASSO_SANDBOX_CLIENT_ID }}
          HELLOASSO_SANDBOX_CLIENT_SECRET: ${{ secrets.HELLOASSO_SANDBOX_CLIENT_SECRET }}
        run: bash scripts/build_release.sh "${VERSION}"

      - name: Create GitHub Release and Upload Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: helloasso-payment-processor-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
